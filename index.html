<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Crawler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 3px solid #4a4a6a;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }
        #ui div {
            margin-bottom: 5px;
        }
        #deathScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        #deathScreen h1 {
            font-size: 48px;
            color: #e74c3c;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #e74c3c;
        }
        #deathScreen p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #bbb;
        }
        #restartBtn {
            padding: 15px 40px;
            font-size: 18px;
            background: #e74c3c;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        #restartBtn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #888;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div id="hpDisplay">HP: 100/100</div>
            <div id="levelDisplay">Level: 1</div>
            <div id="xpDisplay">XP: 0/100</div>
            <div id="statsDisplay">ATK: 10 | SPD: 3</div>
        </div>
        <div id="deathScreen">
            <h1>YOU DIED</h1>
            <p id="deathStats">Level 1 | Enemies Defeated: 0</p>
            <button id="restartBtn">Restart Game</button>
        </div>
        <div id="instructions">WASD: Move | Left Click: Attack | Collect loot by walking over it</div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = 800;
        const HEIGHT = 600;

        // Game state
        let gameOver = false;
        let enemiesDefeated = 0;
        let mouseX = 0;
        let mouseY = 0;
        let keys = {};

        // Dungeon layout - 4 connected rooms
        const ROOM_WIDTH = 800;
        const ROOM_HEIGHT = 600;
        const rooms = [
            { id: 0, x: 0, y: 0, connections: [1, 2], color: '#2d2d44' },
            { id: 1, x: 1, y: 0, connections: [0, 3], color: '#2d3d44' },
            { id: 2, x: 0, y: 1, connections: [0, 3], color: '#3d2d44' },
            { id: 3, x: 1, y: 1, connections: [1, 2], color: '#3d3d44' }
        ];
        let currentRoom = 0;

        // Doorways
        const DOOR_SIZE = 80;
        const doorways = {
            right: { x: WIDTH - 20, y: HEIGHT/2 - DOOR_SIZE/2, w: 40, h: DOOR_SIZE },
            left: { x: -20, y: HEIGHT/2 - DOOR_SIZE/2, w: 40, h: DOOR_SIZE },
            bottom: { x: WIDTH/2 - DOOR_SIZE/2, y: HEIGHT - 20, w: DOOR_SIZE, h: 40 },
            top: { x: WIDTH/2 - DOOR_SIZE/2, y: -20, w: DOOR_SIZE, h: 40 }
        };

        // Player
        const player = {
            x: WIDTH / 2,
            y: HEIGHT / 2,
            size: 24,
            hp: 100,
            maxHp: 100,
            attack: 10,
            speed: 3,
            xp: 0,
            xpToLevel: 100,
            level: 1,
            isAttacking: false,
            attackAngle: 0,
            attackTimer: 0,
            attackDuration: 15,
            attackCooldown: 0,
            attackRange: 50,
            attackArc: Math.PI / 2, // 90 degree arc
            color: '#3498db',
            invulnerable: 0
        };

        // Enemy types
        const enemyTypes = {
            grunt: {
                size: 20,
                hp: 30,
                attack: 8,
                speed: 1.5,
                color: '#e74c3c',
                xp: 25,
                chaseRange: 200,
                attackRange: 30,
                attackCooldown: 60
            },
            brute: {
                size: 30,
                hp: 80,
                attack: 15,
                speed: 1,
                color: '#9b59b6',
                xp: 50,
                chaseRange: 150,
                attackRange: 40,
                attackCooldown: 90
            },
            speeder: {
                size: 16,
                hp: 20,
                attack: 5,
                speed: 2.5,
                color: '#2ecc71',
                xp: 30,
                chaseRange: 250,
                attackRange: 25,
                attackCooldown: 40
            }
        };

        let enemies = [];
        let loot = [];
        let damageNumbers = [];
        let particles = [];

        // Loot types
        const lootTypes = {
            health: { color: '#e74c3c', symbol: '+', effect: (p) => { p.hp = Math.min(p.hp + 30, p.maxHp); } },
            attackBoost: { color: '#f39c12', symbol: 'A', effect: (p) => { p.attack += 2; } },
            speedBoost: { color: '#3498db', symbol: 'S', effect: (p) => { p.speed += 0.3; } }
        };

        // Initialize enemies for a room
        function spawnEnemies() {
            enemies = [];
            const numEnemies = 3 + Math.floor(player.level / 2);
            const types = ['grunt', 'brute', 'speeder'];

            for (let i = 0; i < numEnemies; i++) {
                const type = types[Math.floor(Math.random() * types.length)];
                const template = enemyTypes[type];

                // Spawn away from player and doors
                let x, y, valid;
                do {
                    x = 100 + Math.random() * (WIDTH - 200);
                    y = 100 + Math.random() * (HEIGHT - 200);
                    const distToPlayer = Math.hypot(x - player.x, y - player.y);
                    valid = distToPlayer > 150;
                } while (!valid);

                enemies.push({
                    x, y,
                    ...template,
                    maxHp: template.hp,
                    type,
                    state: 'patrol',
                    patrolTarget: { x: Math.random() * WIDTH, y: Math.random() * HEIGHT },
                    attackTimer: 0,
                    hitFlash: 0
                });
            }
        }

        // Input handling
        document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        canvas.addEventListener('click', () => {
            if (!gameOver && player.attackCooldown <= 0) {
                player.isAttacking = true;
                player.attackTimer = player.attackDuration;
                player.attackAngle = Math.atan2(mouseY - player.y, mouseX - player.x);
                player.attackCooldown = 25;

                // Check for hits
                enemies.forEach(enemy => {
                    const dist = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                    if (dist <= player.attackRange + enemy.size) {
                        const angleToEnemy = Math.atan2(enemy.y - player.y, enemy.x - player.x);
                        let angleDiff = angleToEnemy - player.attackAngle;
                        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                        if (Math.abs(angleDiff) <= player.attackArc / 2) {
                            const damage = player.attack + Math.floor(Math.random() * 5);
                            enemy.hp -= damage;
                            enemy.hitFlash = 10;
                            enemy.state = 'chase';

                            // Knockback
                            const knockAngle = Math.atan2(enemy.y - player.y, enemy.x - player.x);
                            enemy.x += Math.cos(knockAngle) * 15;
                            enemy.y += Math.sin(knockAngle) * 15;

                            // Damage number
                            damageNumbers.push({
                                x: enemy.x,
                                y: enemy.y - enemy.size,
                                value: damage,
                                color: '#fff',
                                life: 60
                            });

                            // Particles
                            for (let i = 0; i < 5; i++) {
                                particles.push({
                                    x: enemy.x,
                                    y: enemy.y,
                                    vx: (Math.random() - 0.5) * 4,
                                    vy: (Math.random() - 0.5) * 4,
                                    life: 20,
                                    color: enemy.color
                                });
                            }
                        }
                    }
                });
            }
        });

        document.getElementById('restartBtn').addEventListener('click', restartGame);

        function restartGame() {
            player.x = WIDTH / 2;
            player.y = HEIGHT / 2;
            player.hp = 100;
            player.maxHp = 100;
            player.attack = 10;
            player.speed = 3;
            player.xp = 0;
            player.xpToLevel = 100;
            player.level = 1;
            player.isAttacking = false;
            player.attackCooldown = 0;
            player.invulnerable = 0;
            currentRoom = 0;
            enemiesDefeated = 0;
            gameOver = false;
            loot = [];
            damageNumbers = [];
            particles = [];
            document.getElementById('deathScreen').style.display = 'none';
            spawnEnemies();
        }

        function levelUp() {
            player.level++;
            player.xp -= player.xpToLevel;
            player.xpToLevel = Math.floor(player.xpToLevel * 1.5);
            player.maxHp += 20;
            player.hp = player.maxHp; // Full restore
            player.attack += 3;
            player.speed += 0.2;

            // Level up particles
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: player.x,
                    y: player.y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 40,
                    color: '#f1c40f'
                });
            }

            damageNumbers.push({
                x: player.x,
                y: player.y - 40,
                value: 'LEVEL UP!',
                color: '#f1c40f',
                life: 90
            });
        }

        function update() {
            if (gameOver) return;

            // Player movement
            let dx = 0, dy = 0;
            if (keys['w']) dy -= 1;
            if (keys['s']) dy += 1;
            if (keys['a']) dx -= 1;
            if (keys['d']) dx += 1;

            if (dx !== 0 || dy !== 0) {
                const len = Math.hypot(dx, dy);
                dx /= len;
                dy /= len;
                player.x += dx * player.speed;
                player.y += dy * player.speed;
            }

            // Keep player in bounds (but allow through doorways)
            const margin = player.size;

            // Check room transitions
            const room = rooms[currentRoom];

            // Right door (to room on the right)
            if (player.x > WIDTH - margin && room.connections.includes(currentRoom + 1) && rooms[currentRoom].x < rooms[currentRoom + 1]?.x) {
                if (player.y > HEIGHT/2 - DOOR_SIZE/2 && player.y < HEIGHT/2 + DOOR_SIZE/2) {
                    currentRoom = room.connections.find(r => rooms[r].x > room.x) || currentRoom;
                    player.x = margin + 30;
                    spawnEnemies();
                }
            }
            // Left door
            if (player.x < margin && room.connections.some(r => rooms[r].x < room.x)) {
                if (player.y > HEIGHT/2 - DOOR_SIZE/2 && player.y < HEIGHT/2 + DOOR_SIZE/2) {
                    currentRoom = room.connections.find(r => rooms[r].x < room.x) ?? currentRoom;
                    player.x = WIDTH - margin - 30;
                    spawnEnemies();
                }
            }
            // Bottom door
            if (player.y > HEIGHT - margin && room.connections.some(r => rooms[r].y > room.y)) {
                if (player.x > WIDTH/2 - DOOR_SIZE/2 && player.x < WIDTH/2 + DOOR_SIZE/2) {
                    currentRoom = room.connections.find(r => rooms[r].y > room.y) ?? currentRoom;
                    player.y = margin + 30;
                    spawnEnemies();
                }
            }
            // Top door
            if (player.y < margin && room.connections.some(r => rooms[r].y < room.y)) {
                if (player.x > WIDTH/2 - DOOR_SIZE/2 && player.x < WIDTH/2 + DOOR_SIZE/2) {
                    currentRoom = room.connections.find(r => rooms[r].y < room.y) ?? currentRoom;
                    player.y = HEIGHT - margin - 30;
                    spawnEnemies();
                }
            }

            // Clamp to room bounds
            player.x = Math.max(margin, Math.min(WIDTH - margin, player.x));
            player.y = Math.max(margin, Math.min(HEIGHT - margin, player.y));

            // Attack timer
            if (player.attackTimer > 0) player.attackTimer--;
            if (player.attackCooldown > 0) player.attackCooldown--;
            if (player.invulnerable > 0) player.invulnerable--;
            player.isAttacking = player.attackTimer > 0;

            // Update enemies
            enemies.forEach((enemy, idx) => {
                const distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);

                // State machine
                if (distToPlayer < enemy.chaseRange) {
                    enemy.state = 'chase';
                } else if (enemy.state === 'chase' && distToPlayer > enemy.chaseRange * 1.5) {
                    enemy.state = 'patrol';
                    enemy.patrolTarget = {
                        x: 50 + Math.random() * (WIDTH - 100),
                        y: 50 + Math.random() * (HEIGHT - 100)
                    };
                }

                // Movement
                let targetX, targetY;
                if (enemy.state === 'chase') {
                    targetX = player.x;
                    targetY = player.y;
                } else {
                    targetX = enemy.patrolTarget.x;
                    targetY = enemy.patrolTarget.y;

                    // New patrol target if reached
                    if (Math.hypot(targetX - enemy.x, targetY - enemy.y) < 10) {
                        enemy.patrolTarget = {
                            x: 50 + Math.random() * (WIDTH - 100),
                            y: 50 + Math.random() * (HEIGHT - 100)
                        };
                    }
                }

                const angle = Math.atan2(targetY - enemy.y, targetX - enemy.x);
                if (distToPlayer > enemy.attackRange || enemy.state !== 'chase') {
                    enemy.x += Math.cos(angle) * enemy.speed;
                    enemy.y += Math.sin(angle) * enemy.speed;
                }

                // Keep in bounds
                enemy.x = Math.max(enemy.size, Math.min(WIDTH - enemy.size, enemy.x));
                enemy.y = Math.max(enemy.size, Math.min(HEIGHT - enemy.size, enemy.y));

                // Attack player
                if (enemy.attackTimer > 0) enemy.attackTimer--;
                if (enemy.state === 'chase' && distToPlayer < enemy.attackRange + player.size && enemy.attackTimer <= 0) {
                    if (player.invulnerable <= 0) {
                        const damage = enemy.attack + Math.floor(Math.random() * 3);
                        player.hp -= damage;
                        player.invulnerable = 30;

                        damageNumbers.push({
                            x: player.x,
                            y: player.y - player.size,
                            value: damage,
                            color: '#e74c3c',
                            life: 60
                        });

                        // Knockback player
                        const knockAngle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                        player.x += Math.cos(knockAngle) * 10;
                        player.y += Math.sin(knockAngle) * 10;
                    }
                    enemy.attackTimer = enemy.attackCooldown;
                }

                // Hit flash decay
                if (enemy.hitFlash > 0) enemy.hitFlash--;

                // Check death
                if (enemy.hp <= 0) {
                    enemiesDefeated++;
                    player.xp += enemy.xp;

                    // Check level up
                    while (player.xp >= player.xpToLevel) {
                        levelUp();
                    }

                    // Drop loot (30% chance)
                    if (Math.random() < 0.3) {
                        const types = Object.keys(lootTypes);
                        const type = types[Math.floor(Math.random() * types.length)];
                        loot.push({
                            x: enemy.x,
                            y: enemy.y,
                            type,
                            ...lootTypes[type]
                        });
                    }

                    // Death particles
                    for (let i = 0; i < 10; i++) {
                        particles.push({
                            x: enemy.x,
                            y: enemy.y,
                            vx: (Math.random() - 0.5) * 5,
                            vy: (Math.random() - 0.5) * 5,
                            life: 30,
                            color: enemy.color
                        });
                    }

                    enemies.splice(idx, 1);
                }
            });

            // Check player death
            if (player.hp <= 0) {
                gameOver = true;
                document.getElementById('deathStats').textContent =
                    `Level ${player.level} | Enemies Defeated: ${enemiesDefeated}`;
                document.getElementById('deathScreen').style.display = 'flex';
            }

            // Loot collection
            loot = loot.filter(item => {
                const dist = Math.hypot(item.x - player.x, item.y - player.y);
                if (dist < player.size + 15) {
                    item.effect(player);
                    damageNumbers.push({
                        x: player.x,
                        y: player.y - 30,
                        value: item.type === 'health' ? '+30 HP' : item.type === 'attackBoost' ? '+2 ATK' : '+SPD',
                        color: item.color,
                        life: 60
                    });
                    return false;
                }
                return true;
            });

            // Update damage numbers
            damageNumbers = damageNumbers.filter(dn => {
                dn.y -= 1;
                dn.life--;
                return dn.life > 0;
            });

            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });

            // Update UI
            document.getElementById('hpDisplay').textContent = `HP: ${Math.max(0, player.hp)}/${player.maxHp}`;
            document.getElementById('levelDisplay').textContent = `Level: ${player.level}`;
            document.getElementById('xpDisplay').textContent = `XP: ${player.xp}/${player.xpToLevel}`;
            document.getElementById('statsDisplay').textContent = `ATK: ${player.attack} | SPD: ${player.speed.toFixed(1)}`;
        }

        function draw() {
            // Clear with room color
            ctx.fillStyle = rooms[currentRoom].color;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Draw floor pattern
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for (let x = 0; x < WIDTH; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, HEIGHT);
                ctx.stroke();
            }
            for (let y = 0; y < HEIGHT; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(WIDTH, y);
                ctx.stroke();
            }

            // Draw walls
            ctx.fillStyle = '#1a1a2e';
            const wallSize = 15;
            ctx.fillRect(0, 0, WIDTH, wallSize); // Top
            ctx.fillRect(0, HEIGHT - wallSize, WIDTH, wallSize); // Bottom
            ctx.fillRect(0, 0, wallSize, HEIGHT); // Left
            ctx.fillRect(WIDTH - wallSize, 0, wallSize, HEIGHT); // Right

            // Draw doorways
            const room = rooms[currentRoom];
            ctx.fillStyle = '#4a4a6a';

            // Right door
            if (room.connections.some(r => rooms[r].x > room.x)) {
                ctx.fillRect(WIDTH - wallSize, HEIGHT/2 - DOOR_SIZE/2, wallSize, DOOR_SIZE);
            }
            // Left door
            if (room.connections.some(r => rooms[r].x < room.x)) {
                ctx.fillRect(0, HEIGHT/2 - DOOR_SIZE/2, wallSize, DOOR_SIZE);
            }
            // Bottom door
            if (room.connections.some(r => rooms[r].y > room.y)) {
                ctx.fillRect(WIDTH/2 - DOOR_SIZE/2, HEIGHT - wallSize, DOOR_SIZE, wallSize);
            }
            // Top door
            if (room.connections.some(r => rooms[r].y < room.y)) {
                ctx.fillRect(WIDTH/2 - DOOR_SIZE/2, 0, DOOR_SIZE, wallSize);
            }

            // Draw particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 40;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
            });
            ctx.globalAlpha = 1;

            // Draw loot
            loot.forEach(item => {
                ctx.fillStyle = item.color;
                ctx.beginPath();
                ctx.arc(item.x, item.y, 12, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.symbol, item.x, item.y);
            });

            // Draw enemies
            enemies.forEach(enemy => {
                // Body
                ctx.fillStyle = enemy.hitFlash > 0 ? '#fff' : enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.size, 0, Math.PI * 2);
                ctx.fill();

                // Eye direction (toward player or patrol target)
                const targetX = enemy.state === 'chase' ? player.x : enemy.patrolTarget.x;
                const targetY = enemy.state === 'chase' ? player.y : enemy.patrolTarget.y;
                const eyeAngle = Math.atan2(targetY - enemy.y, targetX - enemy.x);
                const eyeDist = enemy.size * 0.4;

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(
                    enemy.x + Math.cos(eyeAngle) * eyeDist,
                    enemy.y + Math.sin(eyeAngle) * eyeDist,
                    enemy.size * 0.3, 0, Math.PI * 2
                );
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(
                    enemy.x + Math.cos(eyeAngle) * (eyeDist + 2),
                    enemy.y + Math.sin(eyeAngle) * (eyeDist + 2),
                    enemy.size * 0.15, 0, Math.PI * 2
                );
                ctx.fill();

                // HP bar
                const hpBarWidth = enemy.size * 2;
                const hpPercent = enemy.hp / enemy.maxHp;
                ctx.fillStyle = '#333';
                ctx.fillRect(enemy.x - hpBarWidth/2, enemy.y - enemy.size - 12, hpBarWidth, 6);
                ctx.fillStyle = hpPercent > 0.5 ? '#2ecc71' : hpPercent > 0.25 ? '#f1c40f' : '#e74c3c';
                ctx.fillRect(enemy.x - hpBarWidth/2, enemy.y - enemy.size - 12, hpBarWidth * hpPercent, 6);
            });

            // Draw player
            const playerAlpha = player.invulnerable > 0 && Math.floor(player.invulnerable / 3) % 2 ? 0.5 : 1;
            ctx.globalAlpha = playerAlpha;

            // Player body
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Player face direction
            const faceAngle = Math.atan2(mouseY - player.y, mouseX - player.x);
            const faceDist = player.size * 0.4;

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(
                player.x + Math.cos(faceAngle) * faceDist,
                player.y + Math.sin(faceAngle) * faceDist,
                player.size * 0.35, 0, Math.PI * 2
            );
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(
                player.x + Math.cos(faceAngle) * (faceDist + 3),
                player.y + Math.sin(faceAngle) * (faceDist + 3),
                player.size * 0.15, 0, Math.PI * 2
            );
            ctx.fill();

            ctx.globalAlpha = 1;

            // Draw attack arc
            if (player.isAttacking) {
                const progress = 1 - (player.attackTimer / player.attackDuration);
                const arcAlpha = 0.6 * (1 - progress);

                ctx.strokeStyle = `rgba(255, 255, 255, ${arcAlpha})`;
                ctx.fillStyle = `rgba(255, 255, 255, ${arcAlpha * 0.3})`;
                ctx.lineWidth = 3;

                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.arc(
                    player.x, player.y,
                    player.attackRange,
                    player.attackAngle - player.attackArc/2,
                    player.attackAngle + player.attackArc/2
                );
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }

            // Player HP bar
            const playerHpWidth = 50;
            const playerHpPercent = player.hp / player.maxHp;
            ctx.fillStyle = '#333';
            ctx.fillRect(player.x - playerHpWidth/2, player.y - player.size - 15, playerHpWidth, 8);
            ctx.fillStyle = playerHpPercent > 0.5 ? '#2ecc71' : playerHpPercent > 0.25 ? '#f1c40f' : '#e74c3c';
            ctx.fillRect(player.x - playerHpWidth/2, player.y - player.size - 15, playerHpWidth * playerHpPercent, 8);

            // Draw damage numbers
            damageNumbers.forEach(dn => {
                ctx.globalAlpha = dn.life / 60;
                ctx.fillStyle = dn.color;
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(dn.value, dn.x, dn.y);
            });
            ctx.globalAlpha = 1;

            // Draw minimap
            const mmX = WIDTH - 110;
            const mmY = 10;
            const mmSize = 100;
            const roomSize = 40;

            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(mmX - 5, mmY - 5, mmSize + 10, mmSize + 10);

            rooms.forEach((r, idx) => {
                const rx = mmX + r.x * (roomSize + 10);
                const ry = mmY + r.y * (roomSize + 10);

                ctx.fillStyle = idx === currentRoom ? '#3498db' : '#555';
                ctx.fillRect(rx, ry, roomSize, roomSize);

                // Draw connections
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 3;
                r.connections.forEach(connIdx => {
                    if (connIdx > idx) {
                        const conn = rooms[connIdx];
                        ctx.beginPath();
                        ctx.moveTo(rx + roomSize/2, ry + roomSize/2);
                        ctx.lineTo(mmX + conn.x * (roomSize + 10) + roomSize/2, mmY + conn.y * (roomSize + 10) + roomSize/2);
                        ctx.stroke();
                    }
                });
            });

            // Player dot on minimap
            const currentRoomData = rooms[currentRoom];
            const mmPlayerX = mmX + currentRoomData.x * (roomSize + 10) + (player.x / WIDTH) * roomSize;
            const mmPlayerY = mmY + currentRoomData.y * (roomSize + 10) + (player.y / HEIGHT) * roomSize;

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(mmPlayerX, mmPlayerY, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        spawnEnemies();
        gameLoop();
    </script>
</body>
</html>
